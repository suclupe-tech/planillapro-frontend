<aside class="sidebar">
  <div class="sidebar-logo">
    <div class="company-logo" *ngIf="companyLogoUrl; else initialsLogo">
      <img [src]="companyLogoUrl" [alt]="companyName">
    </div>

    <ng-template #initialsLogo>
      <div class="company-initials">
        {{ companyInitials }}
      </div>
    </ng-template>

    <span class="company-name">
      {{ companyName }}
    </span>
  </div>

  <nav class="sidebar-menu">
    <a routerLink="/dashboard" routerLinkActive="active" class="menu-item">
      <span class="menu-icon"><i class="bi bi-grid"></i></span>
      <span>Dashboard</span>
    </a>

    <a routerLink="/trabajadores" routerLinkActive="active" class="menu-item">
      <span class="menu-icon"><i class="bi bi-people"></i></span>
      <span>Trabajadores</span>
    </a>

    <a routerLink="/planillas" routerLinkActive="active" class="menu-item">
      <span class="menu-icon"><i class="bi bi-file-earmark-text"></i></span>
      <span>Planillas</span>
    </a>

    <a routerLink="/reportes" routerLinkActive="active" class="menu-item">
      <span class="menu-icon"><i class="bi bi-bar-chart"></i></span>
      <span>Reportes</span>
    </a>

    <a routerLink="/auditoria" routerLinkActive="active" class="menu-item">
      <span class="menu-icon"><i class="bi bi-clock-history"></i></span>
      <span>Auditoría</span>
    </a>

    <a routerLink="/usuarios" routerLinkActive="active" class="menu-item">
      <span class="menu-icon"><i class="bi bi-person-gear"></i></span>
      <span>Usuarios</span>
    </a>

    <a routerLink="/empresas" routerLinkActive="active" class="menu-item">
      <span class="menu-icon"><i class="bi bi-building"></i></span>
      <span>Empresas</span>
    </a>

    <a routerLink="/configuracion" routerLinkActive="active" class="menu-item">
      <span class="menu-icon"><i class="bi bi-gear"></i></span>
      <span>Configuración</span>
    </a>
  </nav>
</aside>
